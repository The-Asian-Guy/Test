<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookstore</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="bookshelf.html">My Bookshelf</a></li>
            </ul>
        </nav>
    </header>

    <div id="book-search-container">
        <h1>Book Search</h1>
        
        <label for="search-query">Enter book title, author, etc.:</label>
        <input type="text" id="search-query" placeholder="Search for books">
        <button id="search-button">Search</button>

        <div id="book-results"></div>

        <label for="page-dropdown">Page:</label>
        <select id="page-dropdown"></select>
        <span id="page-number">Page: 1</span>
    </div>

    <script src="script.js"></script>
</body>
</html>
